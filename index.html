<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Randomizer</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/overlays.css">
  <link rel="stylesheet" href="css/mode.css">
</head>
<body data-mode="simple" data-simple-state="setup">

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <span class="app-title simple-only">🎲 Student Randomizer</span>
    <select id="class-select" class="expert-only" title="Επιλογή τμήματος"></select>
    <button class="btn btn-secondary btn-icon expert-only" id="btn-new-class" title="Νέο τμήμα">+ Τμήμα</button>
    <button class="btn btn-secondary btn-icon expert-only" id="btn-rename-class" title="Μετονομασία">✏️ Μετονομασία</button>
    <button class="btn btn-secondary btn-icon expert-only" id="btn-delete-class" title="Διαγραφή τμήματος">🗑️ Διαγραφή</button>
  </div>
  <div class="header-right">
    <button class="btn btn-secondary" id="btn-mode-toggle" title="Εναλλαγή λειτουργίας">🔧 Expert Mode</button>
    <button class="btn btn-secondary btn-icon" id="btn-theme" title="Εναλλαγή θέματος">🌙</button>
    <button class="btn btn-secondary btn-icon expert-only" id="btn-export-json" title="Εξαγωγή JSON">💾 Εξαγωγή</button>
    <button class="btn btn-secondary btn-icon expert-only" id="btn-import-json" title="Εισαγωγή JSON">📁 Εισαγωγή</button>
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- SIMPLE MODE SETUP SCREEN -->
  <div id="simple-setup" class="simple-setup">
    <div class="simple-setup-card">
      <div class="simple-setup-icon">🎲</div>
      <h1 class="simple-setup-title">Student Randomizer</h1>
      <p class="simple-setup-desc">Πόσους μαθητές έχεις στην τάξη;</p>
      <div class="simple-count-row">
        <button class="btn btn-secondary simple-count-btn" id="btn-count-minus" title="Μείωση">−</button>
        <input type="number" id="simple-count" min="1" max="200" value="20" aria-label="Αριθμός μαθητών">
        <button class="btn btn-secondary simple-count-btn" id="btn-count-plus" title="Αύξηση">+</button>
      </div>
      <button class="btn btn-primary btn-simple-start" id="btn-simple-start">▶ ΕΝΑΡΞΗ</button>
    </div>
  </div>

  <!-- ACTION AREA -->
  <div class="action-area">
    <div style="margin-bottom:12px;">
      <button class="btn btn-primary btn-pick" id="btn-pick">🎲 ΕΠΙΛΟΓΗ ΜΑΘΗΤΗ</button>
    </div>
    <div class="action-row">
      <span class="stats-badge" id="stats-badge">0 / 0 μίλησαν</span>
      <button class="btn btn-secondary expert-only" id="btn-groups">👥 Τυχαίες Ομάδες</button>
      <button class="btn btn-secondary" id="btn-undo" disabled>↩️ Αναίρεση</button>
      <button class="btn btn-secondary" id="btn-reset-session">🔄 Reset</button>
      <button class="btn btn-secondary simple-only" id="btn-change-count">🔢 Αλλαγή αριθμού</button>
      <button class="btn btn-secondary btn-icon expert-only" id="btn-fullscreen" title="Fullscreen">⛶ Fullscreen</button>
    </div>
    <div style="margin-top:12px;" class="expert-only">
      <button class="btn btn-secondary" id="btn-save-session" style="font-size:13px;">💾 Αποθήκευση</button>
      <button class="btn btn-secondary" id="btn-export-csv" style="font-size:13px;">📋 Εξαγωγή CSV</button>
    </div>
  </div>

  <!-- STUDENTS SECTION -->
  <div class="students-section">
    <div class="section-header">
      <span class="section-title expert-only">Μαθητές</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap;" class="expert-only">
        <button class="btn btn-secondary" id="btn-quick-mode">⚡ Γρήγορη Δημιουργία</button>
        <button class="btn btn-secondary" id="btn-show-history">📋 Προβολή Ιστορικού</button>
      </div>
    </div>
    <div class="students-grid" id="students-grid"></div>
  </div>

  <!-- MANAGE AREA — expert only -->
  <div class="manage-area expert-only">
    <div class="add-row">
      <input type="text" class="input-text" id="new-student-input" placeholder="Όνομα μαθητή...">
      <button class="btn btn-primary" id="btn-add-student">+ Προσθήκη</button>
      <button class="btn btn-secondary" id="btn-paste-list">📋 Paste Λίστα</button>
    </div>
  </div>

  <!-- SESSION HISTORY — expert only -->
  <div class="history-panel expert-only" id="session-history-panel">
    <div class="section-header">
      <span class="section-title">Ιστορικό Κλήσεων (Σήμερα)</span>
    </div>
    <ul class="history-list" id="history-list">
      <li style="color:var(--text2);font-size:14px;">Κανένας μαθητής δεν έχει κληθεί ακόμα.</li>
    </ul>
  </div>

</main>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
